<!-- Author: Dr Diego Malpica MD -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 2. End-to-end translational workflow</title>
  <desc id="desc">Workflow diagram showing progression from physiological input through HRV analysis, contextual interpretation, readiness logic, and exportable outputs.</desc>
  <defs>
    <style>
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #1a1a1a; }
      .subtitle { font: 700 20px Arial, Helvetica, sans-serif; fill: #1a1a1a; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1a1a1a; }
      .body { font: 16px Arial, Helvetica, sans-serif; fill: #1a1a1a; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #1a1a1a; }
      .step1 { fill: #eaf4ff; stroke: #2c3e50; stroke-width: 2; rx: 18; ry: 18; }
      .step2 { fill: #eafaf1; stroke: #2c3e50; stroke-width: 2; rx: 18; ry: 18; }
      .step3 { fill: #fff7e6; stroke: #2c3e50; stroke-width: 2; rx: 18; ry: 18; }
      .step4 { fill: #fdf2f2; stroke: #2c3e50; stroke-width: 2; rx: 18; ry: 18; }
      .step5 { fill: #f4ecff; stroke: #2c3e50; stroke-width: 2; rx: 18; ry: 18; }
      .arrow { stroke: #2c3e50; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .support { fill: #ffffff; stroke: #2c3e50; stroke-width: 2; rx: 16; ry: 16; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#2c3e50" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1560" height="860" fill="#ffffff" stroke="#2c3e50" stroke-width="2" rx="30" ry="30" />
  <text x="800" y="70" text-anchor="middle" class="title">Figure 2. End-to-End Translational Workflow</text>

  <rect x="70" y="170" width="210" height="210" class="step1" />
  <circle cx="105" cy="205" r="20" fill="#3498db" />
  <text x="105" y="211" text-anchor="middle" class="label" fill="#ffffff">1</text>
  <text x="175" y="225" text-anchor="middle" class="label">Data Ingestion</text>
  <text x="175" y="255" text-anchor="middle" class="body">RR intervals</text>
  <text x="175" y="280" text-anchor="middle" class="body">Wearable summaries</text>
  <text x="175" y="305" text-anchor="middle" class="body">Mission metadata</text>
  <text x="175" y="340" text-anchor="middle" class="small">Inputs are normalized for</text>
  <text x="175" y="360" text-anchor="middle" class="small">downstream analysis</text>

  <rect x="325" y="170" width="210" height="210" class="step2" />
  <circle cx="360" cy="205" r="20" fill="#27ae60" />
  <text x="360" y="211" text-anchor="middle" class="label" fill="#ffffff">2</text>
  <text x="430" y="225" text-anchor="middle" class="label">HRV Computation</text>
  <text x="430" y="255" text-anchor="middle" class="body">Artifact handling</text>
  <text x="430" y="280" text-anchor="middle" class="body">Time and frequency domains</text>
  <text x="430" y="305" text-anchor="middle" class="body">Nonlinear and windowed views</text>
  <text x="430" y="340" text-anchor="middle" class="small">Core physiology metrics</text>
  <text x="430" y="360" text-anchor="middle" class="small">become available here</text>

  <rect x="580" y="170" width="210" height="210" class="step3" />
  <circle cx="615" cy="205" r="20" fill="#f39c12" />
  <text x="615" y="211" text-anchor="middle" class="label" fill="#ffffff">3</text>
  <text x="685" y="225" text-anchor="middle" class="label">Context Fusion</text>
  <text x="685" y="255" text-anchor="middle" class="body">User profile history</text>
  <text x="685" y="280" text-anchor="middle" class="body">Longitudinal records</text>
  <text x="685" y="305" text-anchor="middle" class="body">Mission and schedule context</text>
  <text x="685" y="340" text-anchor="middle" class="small">Physiology becomes</text>
  <text x="685" y="360" text-anchor="middle" class="small">person- and mission-aware</text>

  <rect x="835" y="170" width="210" height="210" class="step4" />
  <circle cx="870" cy="205" r="20" fill="#e74c3c" />
  <text x="870" y="211" text-anchor="middle" class="label" fill="#ffffff">4</text>
  <text x="940" y="225" text-anchor="middle" class="label">Interpretation Layer</text>
  <text x="940" y="255" text-anchor="middle" class="body">Circadian state</text>
  <text x="940" y="280" text-anchor="middle" class="body">Fatigue and FRMS logic</text>
  <text x="940" y="305" text-anchor="middle" class="body">Space-weather overlays</text>
  <text x="940" y="340" text-anchor="middle" class="small">Cross-domain context is</text>
  <text x="940" y="360" text-anchor="middle" class="small">assembled for interpretation</text>

  <rect x="1090" y="170" width="210" height="210" class="step5" />
  <circle cx="1125" cy="205" r="20" fill="#8e44ad" />
  <text x="1125" y="211" text-anchor="middle" class="label" fill="#ffffff">5</text>
  <text x="1195" y="225" text-anchor="middle" class="label">Operational Outputs</text>
  <text x="1195" y="255" text-anchor="middle" class="body">Readiness framing</text>
  <text x="1195" y="280" text-anchor="middle" class="body">Scheduling summaries</text>
  <text x="1195" y="305" text-anchor="middle" class="body">GO/NO-GO support</text>
  <text x="1195" y="340" text-anchor="middle" class="small">Results support research</text>
  <text x="1195" y="360" text-anchor="middle" class="small">and operational workflows</text>

  <rect x="1345" y="170" width="185" height="210" class="support" />
  <circle cx="1378" cy="205" r="20" fill="#2c3e50" />
  <text x="1378" y="211" text-anchor="middle" class="label" fill="#ffffff">6</text>
  <text x="1438" y="225" text-anchor="middle" class="label">Exports and Audit</text>
  <text x="1438" y="255" text-anchor="middle" class="body">Tables and summaries</text>
  <text x="1438" y="280" text-anchor="middle" class="body">Manuscript artifacts</text>
  <text x="1438" y="305" text-anchor="middle" class="body">Logging and traceability</text>
  <text x="1438" y="340" text-anchor="middle" class="small">Outputs remain reviewable</text>
  <text x="1438" y="360" text-anchor="middle" class="small">and reproducible</text>

  <path d="M 280 275 L 325 275" class="arrow" />
  <path d="M 535 275 L 580 275" class="arrow" />
  <path d="M 790 275 L 835 275" class="arrow" />
  <path d="M 1045 275 L 1090 275" class="arrow" />
  <path d="M 1300 275 L 1345 275" class="arrow" />

  <rect x="120" y="500" width="1360" height="260" class="support" />
  <text x="800" y="545" text-anchor="middle" class="subtitle">Why this workflow matters for the manuscript</text>

  <rect x="170" y="585" width="360" height="120" class="step1" />
  <text x="350" y="620" text-anchor="middle" class="label">Research-facing interpretation</text>
  <text x="350" y="650" text-anchor="middle" class="body">Supports exploratory analytics, cross-domain plots,</text>
  <text x="350" y="672" text-anchor="middle" class="body">and exportable manuscript artifacts.</text>

  <rect x="620" y="585" width="360" height="120" class="step3" />
  <text x="800" y="620" text-anchor="middle" class="label">Operational-facing interpretation</text>
  <text x="800" y="650" text-anchor="middle" class="body">Supports readiness-oriented summaries, crew planning,</text>
  <text x="800" y="672" text-anchor="middle" class="body">and auditable schedule-linked decisions.</text>

  <rect x="1070" y="585" width="360" height="120" class="step5" />
  <text x="1250" y="620" text-anchor="middle" class="label">Evidence boundary</text>
  <text x="1250" y="650" text-anchor="middle" class="body">The workflow is implemented and partly verified as software,</text>
  <text x="1250" y="672" text-anchor="middle" class="body">but not yet validated as a clinical outcome engine.</text>

  <text x="800" y="820" text-anchor="middle" class="small">The figure emphasizes the transition from physiological measurement to contextualized decision support while preserving explicit reproducibility and audit outputs.</text>
</svg>
