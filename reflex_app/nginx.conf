# Author: Dr Diego Malpica MD
#
# Nginx configuration for Reflex v2 production deployment.
# This reverse proxy handles:
# - Static frontend assets
# - WebSocket upgrade for /_event/ (critical for button/event functionality)
# - Backend API proxying (/ping, /upload, /admin)
#
# Reference: https://geniepy.com/blog/how-to-run-reflex-apps-in-production/

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Frontend static files (served from nginx)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # WebSocket endpoint - CRITICAL for Reflex event handling
    # Without proper upgrade headers, buttons/events will not work!
    location /_event {
        proxy_pass http://reflex_backend:8000/_event;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time communication
        proxy_buffering off;
    }

    # Backend health check
    location /ping {
        proxy_pass http://reflex_backend:8000/ping;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # File upload endpoint
    location /_upload {
        proxy_pass http://reflex_backend:8000/_upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow large file uploads
        client_max_body_size 50M;
    }

    # Admin dashboard (if enabled)
    location /admin {
        proxy_pass http://reflex_backend:8000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API routes (catch-all for other backend endpoints)
    location /api {
        proxy_pass http://reflex_backend:8000/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real_IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
