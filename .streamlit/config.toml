# Streamlit configuration for HRV Analysis Suite (Windows/OneDrive-friendly).
#
# Key stability goal:
# - Avoid Streamlit "fade + restart" loops when the app writes data/cache files
#   under the repo (e.g., `crew/` HRV outputs, `app/data_cache/` NOAA caches).

[server]
# OneDrive + synced folders can break Streamlit's default file-watcher.
# In this production research app, we disable the file watcher entirely to prevent
# unrequested reruns ("screen fades") triggered by runtime cache/log writes.
# This is especially important on Windows/OneDrive where filesystem events can be noisy.
fileWatcherType = "none"

# WebSocket ping settings are not supported in this Streamlit version; rely on defaults.

# Prevent Streamlit from treating data/cache/log writes as source changes.
# These paths are resolved relative to the working directory. For the documented
# launch commands (run from repo root), these entries correctly target folders
# inside the project.
folderWatchBlacklist = [
  "logs",
  "crew",
  "app/data_cache",
  ".cursor",
]

# Never auto-rerun on file save in production/research runs.
runOnSave = false

# Run in headless mode (no browser auto-open).
headless = true

# Enable serving static files from .streamlit/static/
enableStaticServing = true

# Maximum upload size in MB (default 200).
maxUploadSize = 500

# Enable Cross-Origin Resource Sharing (for debugging tools).
enableCORS = true

# Enable XSRF protection.
enableXsrfProtection = true

[runner]
# Prevent fast-rerun race conditions (Streamlit 1.36.0 stability).
fastReruns = false
magicEnabled = true
enforceSerializableSessionState = false

[client]
# Helpful for research debugging; the UI also enables this at runtime.
showErrorDetails = true
toolbarMode = "developer"

[browser]
# Disable usage stats collection.
gatherUsageStats = false

[global]
# Development mode - set to true only for verbose debugging.
developmentMode = false
showWarningOnDirectExecution = true

[logger]
level = "info"

