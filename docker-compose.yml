version: "3.9"

# HRV Analysis Platform - Docker Compose Configuration
# Author: Dr. Diego Malpica, MD - Aerospace Medicine Specialist
#
# This configuration provides:
# - PostgreSQL with TimescaleDB for time-series HRV data
# - Streamlit application container
# - Persistent volumes for data safety
# - Health checks for reliability
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f app        # View application logs
#   docker-compose down               # Stop all services
#   docker-compose down -v            # Stop and remove volumes (CAUTION: deletes data)

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database with TimescaleDB Extension
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: hrv_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrv_platform}
      POSTGRES_USER: ${POSTGRES_USER:-hrv_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrv_admin} -d ${POSTGRES_DB:-hrv_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hrv_network

  # ---------------------------------------------------------------------------
  # Redis Cache (for session management and caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hrv_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - hrv_network

  # ---------------------------------------------------------------------------
  # HRV Analysis Application (Streamlit)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrv_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrv_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-hrv_platform}
      REDIS_URL: redis://redis:6379/0
      
      # Streamlit configuration
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      
      # Application settings
      DATA_PATH: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # API keys (set in .env file, DO NOT commit to git)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      
    volumes:
      - app_data:/app/data
      - ./app:/app/app:ro  # Mount app code (read-only in production)
    ports:
      - "${APP_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hrv_network

  # ---------------------------------------------------------------------------
  # HRV Analysis Application (Reflex v2)
  # ---------------------------------------------------------------------------
  # Notes:
  # - This runs the new Reflex UI in prod mode (frontend :3000, backend :8000).
  # - Legacy Streamlit deployment remains the `app` service above.
  reflex_v2:
    build:
      context: .
      dockerfile: Dockerfile.reflex
    container_name: hrv_reflex_v2
    restart: unless-stopped
    profiles:
      - reflex
    environment:
      # Browser must reach the backend websocket URL (override in real deployments)
      API_URL: ${API_URL:-http://localhost:8000}
      PYTHONPATH: /app
      REFLEX_UPLOADED_FILES_DIR: /app/uploaded_files
      REFLEX_SSR: "false"
      # API keys (set in .env file, DO NOT commit)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./crew:/app/crew
      - reflex_uploads:/app/uploaded_files
    ports:
      - "${REFLEX_FRONTEND_PORT:-3001}:3000"
      - "${REFLEX_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - hrv_network

  # ---------------------------------------------------------------------------
  # Database Admin (pgAdmin) - Optional, for development/debugging
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hrv_pgadmin
    restart: unless-stopped
    profiles:
      - admin  # Only start with: docker-compose --profile admin up
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hrv.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    networks:
      - hrv_network

# ---------------------------------------------------------------------------
# Volumes - Persistent Storage
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: hrv_postgres_data
  redis_data:
    name: hrv_redis_data
  app_data:
    name: hrv_app_data
  pgadmin_data:
    name: hrv_pgadmin_data
  reflex_uploads:
    name: hrv_reflex_uploads

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  hrv_network:
    name: hrv_network
    driver: bridge

